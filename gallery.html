<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Memories gallery page for Sasiru and Menuri." />
  <meta name="theme-color" content="#10192b" />
  <title>Sasiru + Menuri | Memories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="topic-page">
  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>
  <div class="floating-hearts" id="floatingHearts" aria-hidden="true"></div>

  <header class="topbar">
    <a class="logo" href="index.html" aria-label="Go to home">
      <span class="logo-mark">S+M</span>
      <span class="logo-text">Sasiru + Menuri</span>
    </a>

    <button
      id="menuToggle"
      class="menu-toggle"
      type="button"
      aria-controls="mobileNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav" id="mobileNav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="gallery.html" aria-current="page">Memories</a>
      <a href="birthday.html">Birthday</a>
      <a href="archive.html">Archive</a>
      <a href="music.html">Song</a>
      <a href="game.html">Puzzle</a>
      <a href="love-actions.html">Love</a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="section">
      <div class="gallery-shell">
        <div class="gallery-copy">
          <p class="eyebrow">Photo memories</p>
          <h2>Moments that already feel timeless</h2>

          <div class="button-row view-switch">
            <button id="slideViewBtn" class="btn btn-secondary" type="button">
              Slideshow
            </button>
            <button id="gridViewBtn" class="btn btn-secondary" type="button">
              Grid View
            </button>
          </div>
        </div>

        <div class="gallery-stage card">
          <div id="slideshow" class="slideshow">
            <button id="prevSlide" class="slide-btn" type="button" aria-label="Previous slide">
              &#10094;
            </button>
            <img id="slideImage" src="1.jpeg" alt="Slideshow image" />
            <button id="nextSlide" class="slide-btn" type="button" aria-label="Next slide">
              &#10095;
            </button>
          </div>

          <div id="galleryGrid" class="gallery-grid hidden">
            <figure class="memory-tile">
              <img src="1.jpeg" alt="Sasiru and Menuri in a close selfie under the sky" loading="lazy" />
            </figure>
            <figure class="memory-tile">
              <img src="2.jpeg" alt="A black and white portrait of Sasiru and Menuri smiling at each other" loading="lazy" />
            </figure>
            <figure class="memory-tile">
              <img src="3.jpeg" alt="Sasiru and Menuri taking a cheerful outdoor selfie" loading="lazy" />
            </figure>
            <figure class="memory-tile">
              <img src="4.jpeg" alt="A soft portrait of Sasiru and Menuri standing close together" loading="lazy" />
            </figure>
            <figure class="memory-tile">
              <img src="5.jpeg" alt="Sasiru and Menuri smiling indoors in front of curtains" loading="lazy" />
            </figure>
            <figure class="memory-tile">
              <img src="6.jpeg" alt="Sasiru and Menuri making playful faces for the camera" loading="lazy" />
            </figure>
            <figure class="memory-tile">
              <img src="7.jpeg" alt="Sasiru and Menuri smiling together in a close portrait" loading="lazy" />
            </figure>
            <figure class="memory-tile">
              <img src="8.jpeg" alt="Sasiru kissing Menuri on the cheek in a playful photo" loading="lazy" />
            </figure>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    The photo page now stands on its own.
  </footer>

  <script type="module" src="script.js"></script>
</body>
</html>
