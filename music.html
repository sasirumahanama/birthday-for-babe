<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Song page for Sasiru and Menuri." />
  <meta name="theme-color" content="#10192b" />
  <title>Sasiru + Menuri | Song</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="topic-page">
  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>
  <div class="floating-hearts" id="floatingHearts" aria-hidden="true"></div>

  <header class="topbar">
    <a class="logo" href="index.html" aria-label="Go to home">
      <span class="logo-mark">S+M</span>
      <span class="logo-text">Sasiru + Menuri</span>
    </a>

    <button
      id="menuToggle"
      class="menu-toggle"
      type="button"
      aria-controls="mobileNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav" id="mobileNav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="gallery.html">Memories</a>
      <a href="birthday.html">Birthday</a>
      <a href="archive.html">Archive</a>
      <a href="music.html" aria-current="page">Song</a>
      <a href="game.html">Puzzle</a>
      <a href="love-actions.html">Love</a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="section">
      <div class="section-heading">
        <p class="eyebrow">Soundtrack</p>
        <h2>The song that belongs here</h2>
      </div>

      <div class="music-card" style="width:min(720px,100%);margin:0 auto;">
        <p class="section-kicker">Now Playing</p>
        <div class="media-toolbar">
          <button id="prevSongBtn" class="slide-btn media-nav-btn" type="button" aria-label="Previous song">
            &#10094;
          </button>
          <div class="media-meta">
            <h3 id="songTitle">Sanda Renu Athi Raaka</h3>
            <p id="songCounter" class="small-text">Song 1 of 4</p>
          </div>
          <button id="nextSongBtn" class="slide-btn media-nav-btn" type="button" aria-label="Next song">
            &#10095;
          </button>
        </div>
        <audio id="songPlayer" controls preload="metadata">
          <source id="songSource" src="Sanda Renu Athi Raaka.mp3" type="audio/mpeg" />
          Your browser does not support the audio element.
        </audio>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    Some songs deserve their own room.
  </footer>

  <script type="module" src="script.js"></script>
</body>
</html>
